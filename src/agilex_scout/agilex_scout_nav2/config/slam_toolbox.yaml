bt_navigator:
    ros__parameters:
        global_frame: map
        robot_base_frame: mobile_robot_base_link
        odom_topic: /odometry
        bt_loop_duration: 10 # ms
        default_server_timeout: 20 # ms
        wait_for_server_timeout: 1000 # ms
        action_server_result_timeout: 60.0 # s
        transform_tolerance: 0.5 # s
        
        #default_nav_to_pose_bt_xml: $(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
        default_nav_through_poses_bt_xml: $(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml
        default_nav_to_pose_bt_xml: $(find-pkg-share agilex_scout_nav2)/config/bt_nav2pose.xml

        navigators: ["navigate_to_pose", "navigate_through_poses"]
        navigate_to_pose:
            plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
        navigate_through_poses:
            plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

        error_code_names:
            - compute_path_error_code
            - follow_path_error_code

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
        plugin: 'opennav_docking::SimpleChargingDock'
        docking_threshold: 0.05
        staging_x_offset: -0.7
        use_external_detection_pose: true
        use_battery_status: false
        use_stall_detection: false
        external_detection_timeout: 1.0
        external_detection_translation_x: -0.18
        external_detection_translation_y: 0.0
        external_detection_rotation_roll: -1.57
        external_detection_rotation_pitch: -1.57
        external_detection_rotation_yaw: 0.0
        filter_coef: 0.1

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15

controller_server:
    ros__parameters:
        controller_frequency: 10.0
        min_x_velocity_threshold: 0.001
        min_y_velocity_threshold: 0.5
        min_theta_velocity_threshold: 0.001
        failure_tolerance: 1.0
        progress_checker_plugins: ["progress_checker"]
        goal_checker_plugins: ["goal_checker"]
        controller_plugins: ["FollowPath"]
        use_realtime_priority: false
        odom_topic: /odometry

        progress_checker:
            plugin: "nav2_controller::SimpleProgressChecker"
            required_movement_radius: 0.25
            movement_time_allowance: 10.0
        goal_checker:
            stateful: True
            plugin: "nav2_controller::SimpleGoalChecker"
            xy_goal_tolerance: 0.15
            yaw_goal_tolerance: 0.15
        FollowPath:
            # combination of 2 local planners: rotation shim controller and MPPI controller
            plugin: "nav2_rotation_shim_controller::RotationShimController"
            primary_controller: "nav2_mppi_controller::MPPIController"

            # Rotation shim controller parameters (rotation in place when angular heading error is larger than threshold)
            angular_dist_threshold: 0.5
            forward_sampling_distance: 0.5
            rotate_to_heading_angular_vel: 1.0
            max_angular_accel: 2.0
            simulate_ahead_time: 3.0

            # MPPI Controller parameters
            time_steps: 50
            model_dt: 0.1
            batch_size: 500 #WAS 1000
            vx_std: 0.2
            vy_std: 0.2
            wz_std: 0.4
            vx_max: 0.5
            vx_min: -0.5
            vy_max: 0.5
            wz_max: 1.0
            iteration_count: 1
            temperature: 0.3
            gamma: 0.015
            visualize: True # True for debugging only (will degrade performance)
            retry_attempt_limit: 1
            regenerate_noises: false

            TrajectoryVisualizer:
                trajectory_step: 20
                time_step: 5
            transform_tolerance: 0.5
            prune_distance: 1.5
            enforce_path_inversion: true
            inversion_xy_tolerance: 0.2
            inversion_yaw_tolerance: 0.4
            motion_model: "DiffDrive"
            AckermannConstraints:
                min_turning_r: 0.2
            critics: [
                    "ConstraintCritic",
                    "ObstaclesCritic",
                    "GoalCritic",
                    "GoalAngleCritic",
                    "PathAlignCritic",
                    "PathFollowCritic",
                    "PathAngleCritic",
                    #"PreferForwardCritic",
                    "TwirlingCritic",
                ]
            ConstraintCritic:
                enabled: true
                cost_power: 1
                cost_weight: 4.0
            GoalCritic:
                enabled: true
                cost_power: 1
                cost_weight: 20.0
                threshold_to_consider: 0.7
            GoalAngleCritic:
                enabled: true
                cost_power: 1
                cost_weight: 5.0
                threshold_to_consider: 0.7
            PreferForwardCritic:
                enabled: false
                cost_power: 1
                cost_weight: 1.0
                threshold_to_consider: 0.7
            ObstaclesCritic:
                enabled: true
                cost_power: 1
                repulsion_weight: 1.4
                critical_weight: 20.0
                consider_footprint: true
                collision_cost: 10000.0
                collision_margin_distance: 0.1
                near_goal_distance: 0.7
            PathAlignCritic:
                enabled: true
                cost_power: 1
                cost_weight: 20.0
                max_path_occupancy_ratio: 0.05
                trajectory_point_step: 3
                offset_from_furthest: 30
                use_path_orientations: true
                threshold_to_consider: 0.7
            PathFollowCritic:
                enabled: true
                cost_power: 1
                cost_weight: 4.0
                offset_from_furthest: 6
                threshold_to_consider: 0.7
            PathAngleCritic:
                enabled: true
                cost_power: 1
                cost_weight: 4.0
                mode: 2
                offset_from_furthest: 4
                max_angle_to_furthest: 0.7
                threshold_to_consider: 0.7
            TwirlingCritic:
                enabled: true
                twirling_cost_power: 1
                twirling_cost_weight: 10.0


local_costmap:
    local_costmap:
        ros__parameters:
            update_frequency: 5.0
            publish_frequency: 2.0
            global_frame: odom
            robot_base_frame: mobile_robot_base_link
            map_topic: /map
            rolling_window: true
            width: 8
            height: 8
            resolution: 0.05
            footprint: "[ [0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35] ]"
            footprint_padding: 0.02
            lethal_cost_threshold: 100
            track_unknown_space: true

            plugins: ["voxel_layer", "denoise_layer", "inflation_layer"]

            static_layer:
                plugin: "nav2_costmap_2d::StaticLayer"
                map_subscribe_transient_local: True
                enabled: true
                subscribe_to_updates: true
                transform_tolerance: 0.5
                map_topic: /map

            voxel_layer:
                plugin: "nav2_costmap_2d::VoxelLayer"
                enabled: True
                footprint_clearing_enabled: true
                publish_voxel_map: False
                origin_z: 0.0
                z_resolution: 0.05
                z_voxels: 16
                unknown_threshold: 15
                mark_threshold: 0
                observation_sources: pointcloud
                combination_method: 1
                pointcloud:
                    topic: /points
                    observation_persistence: 1.0
                    expected_update_rate: 10.0
                    max_obstacle_height: 1.5
                    min_obstacle_height: 0.1
                    obstacle_max_range: 12.0
                    obstacle_min_range: 0.0
                    raytrace_max_range: 15.0
                    raytrace_min_range: 0.0
                    clearing: True
                    marking: True
                    data_type: "PointCloud2"
            
            denoise_layer:
                plugin: "nav2_costmap_2d::DenoiseLayer"
                enabled: true
                minimal_group_size: 4
                group_connectivity_type: 8

            inflation_layer:
                plugin: "nav2_costmap_2d::InflationLayer"
                cost_scaling_factor: 2.0
                inflation_radius: 0.65
            always_send_full_costmap: True

global_costmap:
    global_costmap:
        ros__parameters:
            update_frequency: 1.0
            publish_frequency: 1.0
            global_frame: map
            robot_base_frame: mobile_robot_base_link
            map_topic: /map
            rolling_window: true
            footprint: "[ [0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35] ]"
            footprint_padding: 0.02
            resolution: 0.05
            width: 16
            height: 16
            track_unknown_space: true
            lethal_cost_threshold: 100

            plugins: ["static_layer", "denoise_layer", "inflation_layer"]

            static_layer:
                plugin: "nav2_costmap_2d::StaticLayer"
                map_subscribe_transient_local: True
                enabled: true
                subscribe_to_updates: true
                transform_tolerance: 0.5
                map_topic: /map

            denoise_layer:
                plugin: "nav2_costmap_2d::DenoiseLayer"
                enabled: true
                minimal_group_size: 4
                group_connectivity_type: 8
            
            inflation_layer:
                plugin: "nav2_costmap_2d::InflationLayer"
                cost_scaling_factor: 2.0
                inflation_radius: 0.65
            always_send_full_costmap: True

map_saver:
    ros__parameters:
        save_map_timeout: 5.0
        free_thresh_default: 0.25
        occupied_thresh_default: 0.65
        map_subscribe_transient_local: True

map_server:
    ros__parameters:
        topic_name: /map
        frame_id: map

planner_server:
    ros__parameters:
        expected_planner_frequency: 10.0
        planner_plugins: ["GridBased"]
        GridBased:
            plugin: "nav2_smac_planner::SmacPlannerHybrid"
            downsample_costmap: false
            downsampling_factor: 1
            tolerance: 0.25
            allow_unknown: true
            max_iterations: 1000000
            max_on_approach_iterations: 1000
            max_planning_time: 10.0
            motion_model_for_search: "DUBIN"
            angle_quantization_bins: 64
            analytic_expansion_ratio: 3.5
            analytic_expansion_max_length: 3.0
            minimum_turning_radius: 0.2
            reverse_penalty: 2.0
            change_penalty: 0.0
            non_straight_penalty: 1.2
            cost_penalty: 500.0
            retrospective_penalty: 0.015
            lookup_table_size: 20.0
            cache_obstacle_heuristic: false
            debug_visualizations: false
            use_quadratic_cost_penalty: False
            downsample_obstacle_heuristic: True
            allow_primitive_interpolation: False
            smooth_path: True
            smoother:
                max_iterations: 100
                w_smooth: 0.3
                w_data: 0.2
                tolerance: 1.0e-10
                do_refinement: true
                refinement_num: 2

smoother_server:
    ros__parameters:
        robot_base_frame: mobile_robot_base_link
        footprint_topic: “global_costmap/published_footprint”
        costmap_topic: “global_costmap/costmap_raw”
        smoother_plugins: ["ConstrainedSmootherPlugin"]
        ConstrainedSmootherPlugin:
            plugin: "nav2_constrained_smoother/ConstrainedSmoother"
            reversing_enabled: true
            path_downsampling_factor: 3
            path_upsampling_factor: 1
            keep_start_orientation: true
            keep_goal_orientation: true
            minimum_turning_radius: 0.0
            w_curve: 30.0
            w_dist: 0.0
            w_smooth: 200.0
            w_cost: 500.0
            w_cost_cusp_multiplier: 3.0
            cusp_zone_length: 2.5

            optimizer:
                linear_solver_type: SPARSE_NORMAL_CHOLESKY
                max_iterations: 70
                debug_optimizer: false

behavior_server:
    ros__parameters:
        local_costmap_topic: local_costmap/costmap_raw
        global_costmap_topic: global_costmap/costmap_raw
        local_footprint_topic: local_costmap/published_footprint
        global_footprint_topic: global_costmap/published_footprint
        cycle_frequency: 10.0
        behavior_plugins:
            ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
        spin:
            plugin: "nav2_behaviors::Spin"
        backup:
            plugin: "nav2_behaviors::BackUp"
        drive_on_heading:
            plugin: "nav2_behaviors::DriveOnHeading"
        wait:
            plugin: "nav2_behaviors::Wait"
        assisted_teleop:
            plugin: "nav2_behaviors::AssistedTeleop"
        local_frame: odom
        global_frame: map
        robot_base_frame: mobile_robot_base_link
        transform_tolerance: 0.5
        simulate_ahead_time: 2.0
        max_rotational_vel: 1.0
        min_rotational_vel: 0.2
        rotational_acc_lim: 2.0

waypoint_follower:
    ros__parameters:
        loop_rate: 20
        stop_on_failure: false
        action_server_result_timeout: 900.0
        waypoint_task_executor_plugin: "wait_at_waypoint"
        wait_at_waypoint:
            plugin: "nav2_waypoint_follower::WaitAtWaypoint"
            enabled: True
            waypoint_pause_duration: 200

velocity_smoother:
    ros__parameters:
        smoothing_frequency: 20.0
        scale_velocities: False
        feedback: "OPEN_LOOP"
        max_velocity: [1.0, 0.0, 0.5]
        min_velocity: [-1.0, 0.0, -0.5]
        max_accel: [2.5, 0.0, 2.0]
        max_decel: [-2.5, 0.0, -2.0]
        odom_topic: /odometry
        odom_duration: 0.1
        deadband_velocity: [0.0, 0.0, 0.0]
        velocity_timeout: 1.0

slam_toolbox:
    ros__parameters:

        solver_plugin: solver_plugins::CeresSolver
        ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
        ceres_preconditioner: SCHUR_JACOBI
        ceres_trust_strategy: LEVENBERG_MARQUARDT
        ceres_dogleg_type: TRADITIONAL_DOGLEG
        ceres_loss_function: CauchyLoss

        odom_frame: odom
        map_frame: map
        base_frame: base_footprint
        scan_topic: /laser_scan
        use_map_saver: true

        mode: mapping
        # mode: localization
        # map_file_name: $(find-pkg-share agilex_scout_nav2)/maps/airlab
        # map_start_pose: [0.0, 0.0, 0.0] # substitute with posegraph map start pose

        debug_logging: false
        throttle_scans: 1
        transform_publish_period: 0.02
        map_update_interval: 5.0
        resolution: 0.05
        max_laser_range: 16.0
        minimum_time_interval: 0.5
        transform_timeout: 1.0
        tf_buffer_duration: 30.0
        stack_size_to_use: 40000000
        enable_interactive_mode: true
        use_scan_matching: true
        use_scan_barycenter: true
        minimum_travel_distance: 0.2
        minimum_travel_heading: 0.2
        scan_buffer_size: 10
        scan_buffer_maximum_scan_distance: 10.0
        link_match_minimum_response_fine: 0.1
        link_scan_maximum_distance: 1.5
        loop_search_maximum_distance: 3.0
        do_loop_closing: true
        loop_match_minimum_chain_size: 10
        loop_match_maximum_variance_coarse: 3.0
        loop_match_minimum_response_coarse: 0.35
        loop_match_minimum_response_fine: 0.45
        correlation_search_space_dimension: 0.5
        correlation_search_space_resolution: 0.01
        correlation_search_space_smear_deviation: 0.1
        loop_search_space_dimension: 8.0
        loop_search_space_resolution: 0.05
        loop_search_space_smear_deviation: 0.03
        distance_variance_penalty: 0.5
        angle_variance_penalty: 1.0
        fine_search_angle_offset: 0.00349
        coarse_search_angle_offset: 0.349
        coarse_angle_resolution: 0.0349
        minimum_angle_penalty: 0.9
        minimum_distance_penalty: 0.5
        use_response_expansion: true

collision_monitor:
    ros__parameters:
        base_frame_id: "base_footprint"
        odom_frame_id: "odom"
        cmd_vel_in_topic: "cmd_vel_smoothed"
        cmd_vel_out_topic: "cmd_vel"
        state_topic: "collision_monitor_state"
        transform_tolerance: 0.5
        source_timeout: 5.0
        base_shift_correction: True
        stop_pub_timeout: 2.0
        use_realtime_priority: false

        polygons: ["FootprintStop", "FootprintSlowdown", "FootprintApproach"]
        FootprintStop:
            type: "polygon"
            points: "[[0.48, 0.38], [0.48, -0.38], [-0.48, -0.38], [-0.48, 0.38]]"
            action_type: "stop"
            min_points: 4
            visualize: True
            polygon_pub_topic: "/polygon_stop"
            enabled: True

        FootprintSlowdown:
            type: "polygon"
            points: "[[0.65, 0.55], [0.65, -0.55], [-0.65, -0.55], [-0.65, 0.55]]"
            action_type: "slowdown"
            min_points: 4
            slowdown_ratio: 0.5
            visualize: True
            polygon_pub_topic: "/polygon_slowdown"
            enabled: True

        FootprintApproach:
            type: "polygon"
            action_type: "approach"
            points: "[[0.70, 0.60], [0.70, -0.60], [-0.70, -0.60], [-0.70, 0.60]]"
            time_before_collision: 2.0
            simulation_time_step: 0.02
            min_points: 6
            visualize: True
            enabled: False

        observation_sources: ["pointcloud"]
        pointcloud:
            type: "pointcloud"
            topic: "/points"
            min_height: 0.1
            max_height: 1.5
            enabled: True
